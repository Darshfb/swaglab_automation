name: Quality Engineering Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM

jobs:
  automation-execution:
    name: Execute E2E & API Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Spin up Selenium Grid (Docker Compose)
        run: docker-compose up -d

      - name: Wait for Grid to initialize
        run: sleep 15

      - name: Execute Quality Engineering Suite
        # Run tests and continue on error so Allure reports still generate
        run: mvn clean test -Dbrowser=chrome -Denv=qa -DretryCount=1
        continue-on-error: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: target/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Teardown Selenium Grid
        if: always()
        run: docker-compose down
